<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnePlaylist</title>
  <meta name="description" content="OnePlaylist — Listen to music">
  <meta property="og:title" content="OnePlaylist">
  <meta property="og:description" content="OnePlaylist — Listen to music">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <h1><img src="oneplaylist.png" alt="OnePlaylist" class="sidebar-logo-img"> <span class="sidebar-label">OnePlaylist</span></h1>
        </div>
        <button id="sidebar-collapse-btn" class="btn-icon" title="Collapse sidebar">
          <i class="fas fa-chevron-left"></i>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a href="#/" class="nav-link active" data-view="home">
          <i class="fas fa-home"></i> <span class="sidebar-label">Home</span>
        </a>
      </nav>
      <div class="sidebar-actions">
        <button id="shuffle-all-btn" class="btn-shuffle-all">
          <i class="fas fa-random"></i> <span class="sidebar-label">Shuffle All</span>
        </button>
        <button id="download-all-btn" class="btn-download-all-sidebar">
          <i class="fas fa-download"></i> <span class="sidebar-label">Download All</span>
        </button>
        <a href="#/about" class="nav-link" data-view="about">
          <i class="fas fa-user"></i> <span class="sidebar-label">About</span>
        </a>
      </div>
      <div id="sidebar-resize-handle" class="sidebar-resize-handle"></div>
    </aside>

    <!-- Mobile header -->
    <header id="mobile-header">
      <button id="menu-toggle" class="btn-icon" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>
      <h1 class="mobile-title"><img src="oneplaylist.png" alt="OnePlaylist" class="sidebar-logo-img"> OnePlaylist</h1>
    </header>

    <!-- Main content area -->
    <main id="main-content">
      <div id="view-container">
        <!-- Views rendered here by app.js -->
      </div>
    </main>

    <!-- Player bar (fixed bottom) -->
    <footer id="player-bar" class="player-bar hidden">
      <div class="player-track-info">
        <img id="player-art" class="player-art clickable" src="img/default-cover.svg" alt="Album art">
        <div class="player-text">
          <span class="player-title" data-amplitude-song-info="name"></span>
          <span class="player-artist" data-amplitude-song-info="artist"></span>
        </div>
      </div>

      <div class="player-controls">
        <div class="player-buttons">
          <button class="btn-icon btn-shuffle" id="btn-shuffle" title="Shuffle">
            <i class="fas fa-random"></i>
          </button>
          <button class="btn-icon" id="btn-prev" title="Previous">
            <i class="fas fa-step-backward"></i>
          </button>
          <button class="btn-icon btn-play" id="btn-play-pause" title="Play/Pause">
            <i class="fas fa-play"></i>
            <i class="fas fa-pause"></i>
          </button>
          <button class="btn-icon" id="btn-next" title="Next">
            <i class="fas fa-step-forward"></i>
          </button>
          <button class="btn-icon btn-repeat" id="btn-repeat" title="Repeat">
            <i class="fas fa-redo"></i>
          </button>
        </div>
        <div class="player-progress">
          <span class="player-time-current"><span data-amplitude-current-minutes>0</span>:<span data-amplitude-current-seconds>00</span></span>
          <input type="range" class="progress-bar" min="0" max="100" step="0.1" value="0">
          <span class="player-time-total"><span data-amplitude-duration-minutes>0</span>:<span data-amplitude-duration-seconds>00</span></span>
        </div>
      </div>

      <div class="player-extras">
        <button class="btn-icon btn-download-current" id="btn-download-current" title="Download track">
          <i class="fas fa-download"></i>
        </button>
        <div class="volume-control">
          <button class="btn-icon btn-volume" id="btn-volume" title="Volume">
            <i class="fas fa-volume-up"></i>
          </button>
          <input type="range" class="volume-slider amplitude-volume-slider" min="0" max="100" value="80">
        </div>
      </div>
    </footer>
  </div>

  <!-- Overlay for mobile menu -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- Scripts -->
  <script defer src="https://cdn.jsdelivr.net/npm/amplitudejs@5.3.2/dist/amplitude.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script defer src="js/app.js"></script>
  <script defer src="js/player.js"></script>
  <script defer src="js/download.js"></script>
</body>
</html>
