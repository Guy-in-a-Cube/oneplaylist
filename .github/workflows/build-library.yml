name: Build Library

on:
  push:
    paths:
      - 'media/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build library.json from MP3 metadata
        run: npm run build

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add library.json media/*/cover.*
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generate library.json and cover art from MP3 metadata"
            git push
          fi
